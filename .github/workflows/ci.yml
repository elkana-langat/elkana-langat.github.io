name: CI - Build Check

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-check:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.155.3
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb
          
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          
      - name: Build and verify
        run: |
          hugo --minify --gc --printPathWarnings
          
          # Check for build errors
          if [ $? -ne 0 ]; then
            echo "❌ Hugo build failed"
            exit 1
          fi
          
          # Verify output
          page_count=$(find public -name '*.html' | wc -l)
          echo "✅ Build successful - ${page_count} HTML pages generated"
          
          if [ "$page_count" -lt 50 ]; then
            echo "⚠️  Warning: Expected at least 50 pages, got ${page_count}"
            exit 1
          fi
          
      - name: Check for broken internal links (optional)
        continue-on-error: true
        run: |
          # Simple check for common issues
          if grep -r "href=\"#\"" public/*.html 2>/dev/null; then
            echo "⚠️  Found empty anchor links"
          fi
          
          # Check for missing images in HTML (basic check)
          if grep -r "img src=\"\"" public/*.html 2>/dev/null; then
            echo "⚠️  Found empty image sources"
          fi
