[build]
  command = "hugo --minify --gc --printPathWarnings"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.155.3"
  HUGO_ENABLEGITINFO = "true"
  HUGO_ENV = "production"

[context.production]
  command = "hugo --minify --gc --printPathWarnings"

[context.deploy-preview]
  command = "hugo --minify --gc --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --minify --gc -b $DEPLOY_PRIME_URL"

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    # Content Security Policy
    # No external resources loaded (no Umami, no Google Fonts)
    Content-Security-Policy = """
      default-src 'self'; \
      script-src 'self' 'unsafe-inline'; \
      style-src 'self' 'unsafe-inline'; \
      img-src 'self' data: https:; \
      font-src 'self' data:; \
      connect-src 'self'; \
      frame-ancestors 'self'; \
      base-uri 'self'; \
      form-action 'self'; \
      upgrade-insecure-requests
    """
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Clickjacking protection
    X-Frame-Options = "SAMEORIGIN"
    
    # HSTS - Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Permissions Policy - Disable unnecessary browser features
    Permissions-Policy = """
      camera=(), \
      microphone=(), \
      geolocation=(), \
      interest-cohort=(), \
      payment=(), \
      usb=(), \
      magnetometer=(), \
      gyroscope=(), \
      accelerometer=()
    """

# Cache static assets for 1 year (immutable)
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Fingerprinted assets (Hugo's resource processing with hash)
[[headers]]
  for = "/*_hu*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*_hu*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*_hu*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML (allow quick updates)
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Redirects (if needed in future)
# [[redirects]]
#   from = "/old-path"
#   to = "/new-path"
#   status = 301
